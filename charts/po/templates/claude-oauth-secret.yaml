{{- if and (eq .Values.auth.mode "oauth") .Values.auth.oauth.createSecret }}
{{- if not .Values.auth.oauth.credentialsJson }}
{{- fail "auth.oauth.createSecret=true requires auth.oauth.credentialsJson to be set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.oauth.secretName }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  {{ .Values.auth.oauth.secretKey }}: |
{{ .Values.auth.oauth.credentialsJson | indent 4 }}
{{- end }}
