{{- if and (eq .Values.auth.mode "oauth") .Values.auth.oauth.createSecret (not .Values.auth.oauth.pool.enabled) }}
{{- if not .Values.auth.oauth.credentialsJson }}
{{- fail "auth.oauth.createSecret=true requires auth.oauth.credentialsJson to be set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.oauth.secretName }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  {{ .Values.auth.oauth.secretKey }}: |
{{ .Values.auth.oauth.credentialsJson | indent 4 }}
{{- end }}
{{- if and (eq .Values.auth.mode "oauth") .Values.auth.oauth.pool.enabled .Values.auth.oauth.pool.createSecret }}
{{- $pool := .Values.auth.oauth.pool -}}
{{- if not $pool.credentials }}
{{- fail "auth.oauth.pool.createSecret=true requires auth.oauth.pool.credentials to be a non-empty list" }}
{{- end }}
{{- if and (gt (int $pool.size) 0) (ne (int $pool.size) (len $pool.credentials)) }}
{{- fail (printf "auth.oauth.pool.size=%d but len(credentials)=%d — must match" (int $pool.size) (len $pool.credentials)) }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pool.secretName }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-pool
type: Opaque
stringData:
  {{ $pool.secretKey }}: {{ toJson $pool.credentials | quote }}
{{- end }}
