{{- if and (eq .Values.auth.mode "apikey") .Values.auth.apikey.createSecret (not .Values.auth.apikey.pool.enabled) }}
{{- if not .Values.auth.apikey.apiKey }}
{{- fail "auth.apikey.createSecret=true requires auth.apikey.apiKey to be set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.apikey.secretName }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  {{ .Values.auth.apikey.secretKey }}: {{ .Values.auth.apikey.apiKey | quote }}
{{- end }}
{{- if and (eq .Values.auth.mode "apikey") .Values.auth.apikey.pool.enabled .Values.auth.apikey.pool.createSecret }}
{{- $pool := .Values.auth.apikey.pool -}}
{{- if not $pool.apiKeys }}
{{- fail "auth.apikey.pool.createSecret=true requires auth.apikey.pool.apiKeys to be a non-empty list" }}
{{- end }}
{{- if and (gt (int $pool.size) 0) (ne (int $pool.size) (len $pool.apiKeys)) }}
{{- fail (printf "auth.apikey.pool.size=%d but len(apiKeys)=%d — must match" (int $pool.size) (len $pool.apiKeys)) }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pool.secretName }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-pool
type: Opaque
stringData:
  {{ $pool.secretKey }}: {{ toJson $pool.apiKeys | quote }}
{{- end }}
