{{- if .Values.worker.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "po.serviceAccountName" . }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- with .Values.worker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
# Lifted from k8s/po-worker-deployment.yaml — the worker uses the
# in-cluster client to launch flow-run Jobs (when running against a
# kubernetes-type pool). On a process-type pool these verbs are unused
# but harmless.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "po.workerName" . }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "po.workerName" . }}
  labels:
    {{- include "po.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "po.workerName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "po.serviceAccountName" . }}
{{- end }}
